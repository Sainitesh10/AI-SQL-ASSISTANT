<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SQL Assistant</title>
    <!-- Highlight.js for SQL syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    
    <!-- Chart.js for automatic graphing -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="glass-panel sidebar">
            <div class="sidebar-header">
                <h2>🕒 History</h2>
            </div>
            <div class="history-list" id="history-list">
                <p class="empty-history text-muted">No queries yet. Start asking!</p>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="container glass-panel main-content">
            <header>
                <div class="header-content">
                    <div>
                        <h1>🔮 AI SQL Assistant</h1>
                        <p>Convert plain English into powerful SQL queries instantly.</p>
                    </div>
                    <div class="upload-section">
                        <input type="file" id="file-upload" accept=".csv, .xlsx, .xls" class="hidden-input">
                        <label for="file-upload" class="upload-btn">
                            <span class="upload-icon">📁</span> Upload Dataset
                        </label>
                    </div>
                </div>
            </header>

            <main>
                <div class="input-section">
                    <div class="input-wrapper">
                        <input type="text" id="query-input" placeholder="e.g., Show me the top 3 customers who bought laptops" autocomplete="off">
                        <button id="submit-btn">
                            <span class="btn-text">Generate SQL</span>
                            <div class="loader hidden"></div>
                        </button>
                    </div>
                    <div class="suggestions">
                        <span class="suggestion-chip">List all products over $100</span>
                        <span class="suggestion-chip">Total revenue by category</span>
                        <span class="suggestion-chip">Recent orders from USA</span>
                    </div>
                </div>

                <div id="error-box" class="glass-panel error-panel hidden"></div>
                <div id="success-box" class="glass-panel success-panel hidden"></div>

                <div id="results-section" class="hidden">
                    <div class="sql-box glass-panel">
                        <div class="box-header">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                            <span class="title">Generated SQL</span>
                        </div>
                        <pre><code id="sql-output" class="language-sql"></code></pre>
                    </div>

                    <div class="data-and-chart">
                        <div class="data-box glass-panel">
                            <div class="box-header flex-between">
                                <div>
                                    <h3>📊 Query Results</h3>
                                    <span id="row-count" class="badge">0 rows</span>
                                </div>
                                <button id="export-btn" class="export-btn hidden">📥 Export CSV</button>
                            </div>
                            <div class="table-responsive">
                                <table id="data-table">
                                    <thead id="table-head"></thead>
                                    <tbody id="table-body"></tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Chart Container (Only visible if chartable data) -->
                        <div id="chart-container" class="glass-panel hidden">
                            <div class="box-header">
                                <h3>📈 Auto-Chart</h3>
                            </div>
                            <div class="canvas-wrapper">
                                <canvas id="results-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
